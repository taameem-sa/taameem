name: taameem
description: تطبيق تعميم - منصة التواصل المجتمعي لأمن وسلامة المجتمع
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Firebase
  firebase_core: ^3.1.0
  firebase_auth: ^5.1.0
  cloud_firestore: ^5.1.0
  firebase_storage: ^12.1.0
  firebase_messaging: ^15.1.0
  firebase_remote_config: ^5.1.0

  # Map + Clustering
  flutter_map: ^6.1.0
  latlong2: ^0.9.0
  flutter_map_marker_cluster: ^1.3.0

  # AI
  http: ^1.2.1
  flutter_dotenv: ^5.2.1

  # UI
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0

  # Media
  image_picker: ^1.1.2
  camera: ^0.11.1

  # Auth
  intl_phone_field: ^3.2.0
  pin_code_fields: ^8.0.1

  # Location
  geolocator: ^12.0.0
  permission_handler: ^11.3.1

  # Utils
  shared_preferences: ^2.3.1
  uuid: ^4.4.0
  intl: ^0.20.2
  url_launcher: ^6.3.0

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/images/
    - assets/icons/
  fonts:
    - family: NotoNaskhArabic
      fonts:
        - asset: assets/fonts/NotoNaskhArabic-Regular.ttf
          weight: 400
        - asset: assets/fonts/NotoNaskhArabic-Medium.ttf
          weight: 500
        - asset: assets/fonts/NotoNaskhArabic-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/NotoNaskhArabic-Bold.ttf
          weight: 700
